<!doctype html>
<html lang="ko">

  <title>TTAK Quant</title>
  <link rel="stylesheet" href="{{ static_path('app.css') }}">
</head>
<body>

    <a class="brand" href="{{ app_path('/') }}">TTAK Quant</a>
